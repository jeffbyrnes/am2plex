# Paths to your exported data. Relative paths are resolved against this file's
# own directory, so keeping everything in config/ (as below) needs no extra flags.
library: apple-music.xml
database: plexdb.sqlite

# Optional manual name-mapping files (Apple name -> Plex name). Leave the files
# absent if you have no mappings; see the README for how to build them.
artist_mapping: artist_mapping.json
album_mapping: album_mapping.json
track_mapping: track_mapping.json

# Only sync tracks played or skipped at least this many times.
minimum_plays: 3
minimum_skips: 2

# Fallback date for a play/skip that has no timestamp in the Apple Music export.
default_date: "2024-07-07"

# Plex identity to attribute imported plays/skips to. Run `am2plex --dry-run` to
# discover the account and device IDs on your server.
account_id: 1
device_id: 5

# What to import.
import_plays: true
import_skips: true
import_track_ratings: true
import_album_ratings: true

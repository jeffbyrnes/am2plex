AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  Exclude:
    - "vendor/**/*"
    - ".ruby-lsp/**/*"

# lib/models.rb deliberately keeps the handful of small, closely related
# ActiveRecord models together; one file per class would add noise, not clarity.
Style/OneClassPerFile:
  Enabled: false

# This is a small script project: the matching/import methods are cohesive and
# read best as written; slicing them up to satisfy size metrics would hurt.
Metrics:
  Enabled: false
